<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nissan City Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0b0b;
  color: #fff;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* 🔴 HALO ROJO */
.glow-rojo {
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,0,60,0.35), transparent 70%);
  filter: blur(80px);
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.glow-rojo.active { opacity: 1; }

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.intro-content { text-align: center; }

.intro-logo {
  width: 180px;
  opacity: 0;
  transform: scale(0.8);
  animation: logoAnim 1.2s ease forwards;
}

.intro-text {
  margin-top: 25px;
  letter-spacing: 8px;
  opacity: 0;
  animation: textAnim 1s ease forwards;
  animation-delay: 1s;
}

@keyframes logoAnim { to {opacity:1; transform:scale(1);} }
@keyframes textAnim { to {opacity:0.7;} }

.intro-exit { animation: exitAnim 0.8s forwards; }
@keyframes exitAnim { to {opacity:0;} }

/* HEADER */
.top-bar {
  position: fixed;
  top: 20px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
}

.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo img { width:110px; }

.logo span {
  font-size: 14px;
  letter-spacing: 5px;
  opacity: 0.7;
}

.timer-box {
  font-size: 12px;
  opacity: 0.4;
}

/* SECCIONES */
.section {
  padding: 140px 20px 80px;
  text-align: center;
}

/* BENEFICIOS */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 60px;
  max-width: 900px;
  margin: auto;
}

.beneficio-item {
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.22,1,0.36,1),
              opacity 0.4s ease;
}

.beneficio-item:hover { transform: scale(1.05); }
.beneficio-item img { max-width: 130px; }

/* AUTOS */
.grid-autos {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 50px;
  max-width: 1100px;
  margin: auto;
}

.car-item {
  text-align: center;
  cursor: pointer;
}

.car-item p { margin-top: 10px; opacity: 0.8; }

.car {
  width: 170px;
  height: 110px;
  object-fit: contain;
}

.left { transform: scaleX(-1); }

/* INPUTS */
input {
  display: block;
  margin: 15px auto;
  padding: 16px;
  width: 260px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  border-radius: 12px;
}

/* BOTONES */
.cta {
  background: #fff;
  color: black;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.cta-secundario {
  margin-top: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 14px 30px;
  border-radius: 30px;
  background: transparent;
  color: white;
}

.cta-dinamico {
  margin-top:20px;
  background: linear-gradient(45deg,#ff003c,#ff5f6d);
  border:none;
  padding:14px 30px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

.hidden { display:none; }

.whatsapp-float {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px 18px;
  border-radius:30px;
  text-decoration:none;
  z-index:999;
}

/* 🔥 RESPONSIVE REAL */
@media (max-width: 768px) {

  .top-bar {
    left: 15px;
    right: 15px;
  }

  .logo img {
    width: 80px;
  }

  .logo span {
    font-size: 10px;
    letter-spacing: 2px;
  }

  .section {
    padding: 110px 15px 60px;
  }

  h1 {
    font-size: 22px;
  }

  p {
    font-size: 14px;
  }

  .grid {
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
  }

  .beneficio-item img {
    max-width: 80px;
  }

  .grid-autos {
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
  }

  .car {
    width: 110px;
    height: auto;
  }

  .car-item p {
    font-size: 12px;
  }

  input {
    width: 100%;
    max-width: 320px;
  }

  .cta, .cta-secundario, .cta-dinamico {
    width: 100%;
    max-width: 320px;
    font-size: 14px;
  }

  .whatsapp-float {
    padding: 12px 14px;
    font-size: 14px;
  }

}
</style>
</head>

<body>
