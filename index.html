<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nissan City Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0b0b;
  color: #fff;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* 🔴 HALO ROJO */
.glow-rojo {
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,0,60,0.35), transparent 70%);
  filter: blur(80px);
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.glow-rojo.active { opacity: 1; }

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.intro-content { text-align: center; }

.intro-logo {
  width: 180px;
  opacity: 0;
  transform: scale(0.8);
  animation: logoAnim 1.2s ease forwards;
}

.intro-text {
  margin-top: 25px;
  letter-spacing: 8px;
  opacity: 0;
  animation: textAnim 1s ease forwards;
  animation-delay: 1s;
}

@keyframes logoAnim { to {opacity:1; transform:scale(1);} }
@keyframes textAnim { to {opacity:0.7;} }

.intro-exit { animation: exitAnim 0.8s forwards; }
@keyframes exitAnim { to {opacity:0;} }

/* HEADER */
.top-bar {
  position: fixed;
  top: 20px;
  left: 40px;
  right: 40px;
  display: flex;
  justify-content: space-between;
}

.logo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo img { width:110px; }

.logo span {
  font-size: 14px;
  letter-spacing: 5px;
  opacity: 0.7;
}

.timer-box {
  font-size: 12px;
  opacity: 0.4;
}

/* SECCIONES */
.section {
  padding: 140px 20px 80px;
  text-align: center;
}

/* BENEFICIOS */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 60px;
  max-width: 900px;
  margin: auto;
  position: relative;
}

.beneficio-item {
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.22,1,0.36,1),
              opacity 0.4s ease;
}

.beneficio-item:hover { transform: scale(1.05); }
.beneficio-item img { max-width: 130px; }

/* AUTOS */
.grid-autos {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 50px;
  max-width: 1100px;
  margin: auto;
}

.car-item {
  text-align: center;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.22,1,0.36,1),
              opacity 0.4s ease;
}

.car-item p { margin-top: 10px; opacity: 0.8; }

.car {
  width: 170px;
  height: 110px;
  object-fit: contain;
}

.left { transform: scaleX(-1); }

/* 💎 INPUTS PREMIUM */
input, select {
  display: block;
  margin: 15px auto;
  padding: 16px;
  width: 260px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  border-radius: 12px;
  outline: none;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

input:focus, select:focus {
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  transform: scale(1.02);
}

/* BOTONES */
.cta {
  background: #fff;
  color: black;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
}

.cta-secundario {
  margin-top: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 14px 30px;
  border-radius: 30px;
  background: transparent;
  color: white;
}

/* BOTÓN EXTRA */
.cta-dinamico {
  margin-top:20px;
  background: linear-gradient(45deg,#ff003c,#ff5f6d);
  border:none;
  padding:14px 30px;
  border-radius:30px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.cta-dinamico:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,0,60,0.5);
}

.hidden { display:none; }

/* WHATS */
.whatsapp-float {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px 18px;
  border-radius:30px;
  text-decoration:none;
  z-index:999;
}
@media (max-width: 768px) {

  .top-bar {
    left: 20px;
    right: 20px;
  }

  .logo img {
    width: 80px;
  }

  .logo span {
    font-size: 10px;
    letter-spacing: 2px;
  }

  .section {
    padding: 120px 15px 60px;
  }

  h1 {
    font-size: 22px;
  }

  p {
    font-size: 14px;
  }

  .grid {
    grid-template-columns: repeat(2,1fr);
    gap: 25px;
  }

  .beneficio-item img {
    max-width: 90px;
  }

  .grid-autos {
    grid-template-columns: repeat(2,1fr);
    gap: 25px;
  }

  .car {
    width: 120px;
    height: auto;
  }

  .car-item p {
    font-size: 12px;
  }

  input, select {
    width: 90%;
    font-size: 14px;
  }

  .cta, .cta-secundario, .cta-dinamico {
    width: 90%;
    font-size: 14px;
  }

  .whatsapp-float {
    padding: 12px 14px;
    font-size: 14px;
  }

}
</style>
</head>

<body>

<div id="glow" class="glow-rojo"></div>

<a class="whatsapp-float" href="https://wa.me/5631214071" target="_blank">
💬 WhatsApp
</a>

<div id="intro">
  <div class="intro-content">
    <img src="logo.jpg" class="intro-logo">

  </div>
</div>

<div class="top-bar">
  <div class="logo">
    <img src="logo.jpg">
    <span>NISSAN CITY HUB</span>
  </div>
  <div id="contador" class="timer-box"></div>

<div class="section" id="beneficios">

<div class="grid">

<div class="beneficio-item" onclick="selectBeneficio(this,'Tatuado')"><img src="tatuado.jpg"><p>TATUADO</p></div>
<div class="beneficio-item" onclick="selectBeneficio(this,'Tapetes')"><img src="tapetes.jpg"><p>TAPETES</p></div>
<div class="beneficio-item" onclick="selectBeneficio(this,'Servicio')"><h2>1er Servicio</h2></div>
<div class="beneficio-item" onclick="selectBeneficio(this,'Película')"><img src="polarizado.jpg"><p>PELÍCULA</p></div>
</div>

<button class="cta-dinamico" onclick="alert('🔥 Promoción activa solo hoy')">
ACTIVO SOLO ESTA SEMANA
</button>

</div>

<div class="section hidden" id="modelos">
<h1>Selecciona tu modelo</h1>

<div class="grid-autos">
<div class="car-item" onclick="selectCar(this,'Versa')"><img src="VERSA.PNG" class="car left"><p>VERSA</p></div>
<div class="car-item" onclick="selectCar(this,'Sentra')"><img src="SENTRA.PNG" class="car left"><p>SENTRA</p></div>
<div class="car-item" onclick="selectCar(this,'Kicks')"><img src="kicks.png" class="car left"><p>KICKS</p></div>
<div class="car-item" onclick="selectCar(this,'X-Trail')"><img src="xtrail.png" class="car"><p>X-TRAIL</p></div>
<div class="car-item" onclick="selectCar(this,'e-POWER')"><img src="epower.png" class="car left"><p>E-POWER</p></div>
<div class="car-item" onclick="selectCar(this,'Magnite')"><img src="magnite.png" class="car left"><p>MAGNITE</p></div>
<div class="car-item" onclick="selectCar(this,'Frontier')"><img src="frontier.png" class="car"><p>FRONTIER</p></div>
<div class="car-item" onclick="selectCar(this,'Pathfinder')"><img src="pathfinder.png" class="car"><p>PATHFINDER</p></div>
</div>
</div>

<div class="section hidden" id="datos">
<h1>Registro</h1>

<input id="nombre" placeholder="Nombre">

<input id="telefono" placeholder="Teléfono"
inputmode="numeric"
maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<button class="cta" onclick="enviarDatos()">Continuar</button>
</div>

<div class="section hidden" id="final">
<h1>Registro completado</h1>
<p id="folioTexto"></p>
<button class="cta-secundario" onclick="abrirWhats()">QUIERO MI CRÉDITO APROBADO HOY</button>
</div>

<script>
let beneficio="",modelo="",folio="";

window.onload=()=>{
setTimeout(()=>{
intro.classList.add("intro-exit");
setTimeout(()=>intro.style.display="none",800);
},2200);
};

let tiempo=600;
setInterval(()=>{
let m=Math.floor(tiempo/60);
let s=tiempo%60;
contador.innerText=`Promoción expira en ${m}:${s<10?'0'+s:s}`;
tiempo--;
},1000);

function cambiar(a,b){
a.style.display="none";
b.classList.remove("hidden");
}

function animarCentro(el, callback){
  const rect = el.getBoundingClientRect();
  const glow = document.getElementById("glow");

  const dx = window.innerWidth/2 - (rect.left + rect.width/2);
  const dy = window.innerHeight/2 - (rect.top + rect.height/2);

  glow.classList.add("active");
  glow.style.left = (rect.left - 100) + "px";
  glow.style.top = (rect.top - 100) + "px";

  el.style.transition = "transform 0.8s cubic-bezier(0.22,1,0.36,1)";
  el.style.transform = `translate(${dx}px, ${dy}px) scale(2)`;
  el.style.zIndex = "20";

  requestAnimationFrame(()=>{
    glow.style.transform = `translate(${dx}px, ${dy}px)`;
  });

  document.querySelectorAll(".beneficio-item, .car-item").forEach(e=>{
    if(e!==el){
      e.style.opacity="0.1";
      e.style.transform="scale(0.7)";
    }
  });

  setTimeout(()=>{
    callback();

    el.style.transform = "";
    el.style.zIndex = "";

    glow.classList.remove("active");
    glow.style.transform = "";

    document.querySelectorAll(".beneficio-item, .car-item").forEach(e=>{
      e.style.opacity="";
      e.style.transform="";
    });

  },800);
}

function selectBeneficio(el,b){
beneficio=b;
animarCentro(el, ()=>cambiar(beneficios,modelos));
}

function selectCar(el,m){
modelo=m;
animarCentro(el, ()=>cambiar(modelos,datos));
}

function enviarDatos(){

let nombre=document.getElementById("nombre").value;
let tel=document.getElementById("telefono").value;

if(!tel || tel.length<10){
alert("Teléfono inválido");
return;
}

fetch("https://script.google.com/macros/s/AKfycbzK2Z5Lr6x0bTbxBIb2aWNpYhGa-Nj6SDKKBIiBiMplCh97dnSZrFtkygO6fC2NJPzewg/exec", {
  method: "POST",
  body: JSON.stringify({
    nombre: nombre,
    telefono: tel,
    modelo: modelo,
    beneficio: beneficio
  }),
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  }
});

folio="NS"+Math.floor(Math.random()*100000);
folioTexto.innerHTML=`Folio: ${folio}<br>${beneficio}<br>${modelo}`;

setTimeout(()=>{
  let texto=`Hola, quiero avanzar con mi crédito hoy.

Nombre: ${nombre}
Teléfono: ${tel}
Modelo: ${modelo}
Beneficio: ${beneficio}`;

  window.open(`https://wa.me/5631214071?text=${encodeURIComponent(texto)}`);
},800);

}

function abrirWhats(){
let texto=`Hola quiero avanzar con mi crédito hoy. Modelo: ${modelo}`;
window.open(`https://wa.me/5631214071?text=${encodeURIComponent(texto)}`);
}
</script>

</body>
</html>
